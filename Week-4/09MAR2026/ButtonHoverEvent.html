<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mouse Hover Event</title>
</head>

<body>

<button id="submitBtn">Submit</button>

<script>

document.getElementById("submitBtn").addEventListener("mouseover", () => {

    alert("Mouse hovered over submit button");

});

</script>

</body>
</html>
