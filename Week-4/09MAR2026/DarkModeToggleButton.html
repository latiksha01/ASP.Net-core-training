<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark Mode Toggle</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:white;
    color:black;
    text-align:center;
    margin-top:100px;
    transition:0.3s;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

/* Dark mode style */
.dark{
    background:black;
    color:white;
}
</style>

</head>

<body>

<h1>Dark Mode Toggle Example</h1>

<button id="darkMode">Toggle Dark Mode</button>

<script>

// Arrow function used for event listener
document.getElementById("darkMode").addEventListener("click", () => {

    document.body.classList.toggle("dark");

});

</script>

</body>
</html>
