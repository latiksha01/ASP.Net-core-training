<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JavaScript Array Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #f5f4f0;
    min-height: 100vh;
    padding: 48px 24px;
    color: #1a1a1a;
  }

  header {
    max-width: 640px;
    margin: 0 auto 40px;
  }

  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 6px;
  }

  header p {
    font-size: 0.85rem;
    color: #999;
  }

  .cards {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .card {
    background: #fff;
    border: 1px solid #e8e6e0;
    border-radius: 6px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color 0.15s;
  }

  .card:hover { border-color: #c5c0b8; }

  .card-info {
    flex: 1;
    min-width: 0;
  }

  .card-label {
    font-size: 0.7rem;
    font-family: 'IBM Plex Mono', monospace;
    color: #aaa;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .card-title {
    font-size: 0.95rem;
    font-weight: 500;
    color: #1a1a1a;
  }

  .card-output {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    color: #2a7a4f;
    background: #f0faf4;
    border: 1px solid #c8ead8;
    border-radius: 4px;
    padding: 6px 10px;
    margin-top: 10px;
    display: none;
    word-break: break-all;
  }

  .card-output.visible { display: block; }

  .run-btn {
    flex-shrink: 0;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 8px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.15s;
  }

  .run-btn:hover { background: #333; }
  .run-btn:active { background: #000; }
</style>
</head>
<body>

<header>
  <h1>Array Methods</h1>
  <p>Click Run to execute each task</p>
</header>

<div class="cards">

  <div class="card">
    <div class="card-info">
      <div class="card-label">map()</div>
      <div class="card-title">Student Grade Processing</div>
      <div class="card-output" id="out16"></div>
    </div>
    <button class="run-btn" onclick="showQ16()">Run</button>
  </div>

  <div class="card">
    <div class="card-info">
      <div class="card-label">filter()</div>
      <div class="card-title">Online Order Filtering</div>
      <div class="card-output" id="out17"></div>
    </div>
    <button class="run-btn" onclick="showQ17()">Run</button>
  </div>

  <div class="card">
    <div class="card-info">
      <div class="card-label">reduce()</div>
      <div class="card-title">Shopping Cart Total</div>
      <div class="card-output" id="out18"></div>
    </div>
    <button class="run-btn" onclick="showQ18()">Run</button>
  </div>

  <div class="card">
    <div class="card-info">
      <div class="card-label">map()</div>
      <div class="card-title">E-Commerce Price Update</div>
      <div class="card-output" id="out19"></div>
    </div>
    <button class="run-btn" onclick="showQ19()">Run</button>
  </div>

  <div class="card">
    <div class="card-info">
      <div class="card-label">filter()</div>
      <div class="card-title">Pass Students Only</div>
      <div class="card-output" id="out20"></div>
    </div>
    <button class="run-btn" onclick="showQ20()">Run</button>
  </div>

</div>

<script>
  function show(id, value) {
    const el = document.getElementById(id);
    el.textContent = Array.isArray(value) ? `[ ${value.join(', ')} ]` : value;
    el.classList.add('visible');
  }

  function showQ16() {
    const marks = [65,70,80,55,90];
    show("out16", marks.map(m => m + 5));
  }
  function showQ17() {
    const orders = [450,1200,700,3000,1500];
    show("out17", orders.filter(o => o > 1000));
  }
  function showQ18() {
    const cart = [500,1200,800,1500];
    show("out18", cart.reduce((t, i) => t + i, 0));
  }
  function showQ19() {
    const prices = [1200,800,1500,2000];
    show("out19", prices.map(p => p * 0.9));
  }
  function showQ20() {
    const marks = [35,67,48,90,55,30];
    show("out20", marks.filter(m => m > 50));
  }
</script>

</body>
</html>
