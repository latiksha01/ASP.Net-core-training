<div class="page">

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">H</div>
    <span>HackerBank</span>
  </div>

  <!-- Filter -->
  <div class="filter-section">
    <input type="date" [(ngModel)]="selectedDate">
    <button (click)="filterByDate()" [disabled]="!selectedDate">Filter</button>
    <button (click)="resetFilter()">Reset</button>
    <button class="add-btn" (click)="openPopup()">+ Add Transaction</button>
  </div>

  <!-- Table -->
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Type</th>
          <th (click)="sortByAmount()" class="clickable">Amount ($)</th>
          <th>Available Balance</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let txn of filteredTransactions">
          <td>{{ txn.date }}</td>
          <td>{{ txn.description }}</td>
          <td>{{ txn.type === 0 ? 'Credit' : 'Debit' }}</td>
          <td>{{ txn.amount }}</td>
          <td>{{ txn.balance }}</td>
        </tr>

        <tr *ngIf="filteredTransactions.length === 0">
          <td colspan="5">No Transactions Found</td>
        </tr>
      </tbody>
    </table>
  </div>
  <!-- Popup -->
<div class="popup" *ngIf="showPopup">
  <div class="popup-content">

    <h2>Add Transaction</h2>

    <input type="date" [(ngModel)]="newTransaction.date" placeholder="Date">

    <input type="text" [(ngModel)]="newTransaction.description" placeholder="Description">

    <select [(ngModel)]="newTransaction.type">
      <option [value]="0">Credit</option>
      <option [value]="1">Debit</option>
    </select>

    <input type="number" [(ngModel)]="newTransaction.amount" placeholder="Amount">

    <input type="text" [(ngModel)]="newTransaction.balance" placeholder="Balance">

    <div class="popup-buttons">
      <button (click)="addTransaction()">Save</button>
      <button (click)="closePopup()">Cancel</button>
    </div>

  </div>
</div>

</div>
