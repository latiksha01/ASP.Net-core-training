<h2 class="title">🛍️ Our Products</h2>

<div class="product-container">
  <div class="product-card" *ngFor="let product of products">
    
    <h3>{{ product.name }}</h3>
    <p class="price">₹ {{ product.price }}</p>

    <button (click)="addToCart(product)">
      Add to Cart
    </button>

  </div>
</div>

<hr>

<!-- ✅ CART PREVIEW -->
<h2 class="title">🛒 Cart Preview</h2>

<ul class="cart-preview">
  <li *ngFor="let item of getCartItems()">
    {{ item.name }} - ₹{{ item.price }}
  </li>
</ul>

<p *ngIf="getCartItems().length === 0" class="empty">
  Cart is empty 😢
</p>
